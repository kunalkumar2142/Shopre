server:
  port: 8081

spring:
  application:
    name: shopre-api-gateway
  profiles:
    active: local
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: shopre-auth-public-routes
          uri: lb://shopre-user-authentication-service
          predicates:
            - Path=/api/v1/auth/**

        - id: shopre-user-public-routes
          uri: lb://shopre-user-authentication-service
          predicates:
            - Path=/api/v1/users/**

        - id: shopre-product-service-public-routes
          uri: lb://shopre-product-service
          predicates:
            - Path=/api/v1/products/**

        - id: shopre-product-service-public-admin-routes
          uri: lb://shopre-product-service
          predicates:
            - Path=/api/v1/admin/products/**