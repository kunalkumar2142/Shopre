server:
  port: 8080

spring:
  application:
    name: shopre-api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id:  shopre-user-authentication-service-public-routes
          uri: lb://shopre-user-authentication-service
          predicates:
            - Path=/api/v1/auth/**

        - id: shopre-user-authentication-service-public-routes
          uri: lb://shopre-user-authentication-service
          predicates:
            - Path=/api/v1/users/**

        - id: shopre-product-service-public-routes
          uri: lb://shopre-product-service
          predicates:
            - Path=/api/v1/products/**