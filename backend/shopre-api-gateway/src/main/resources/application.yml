server:
  port: 8081

spring:
  application:
    name: shopre-api-gateway
  profiles:
    active: local
  cloud:
    gateway:
      enabled: true
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          "[/**]":
            allowedOrigins:
              - http://localhost:5173
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: true
      default-filters:
        # Remove downstream CORS headers so only gateway-managed CORS is returned
        - RemoveResponseHeader=Access-Control-Allow-Origin
        - RemoveResponseHeader=Access-Control-Allow-Credentials
        # Dedupe just in case anything else adds CORS headers
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin, RETAIN_FIRST

      routes:
        - id: shopre-auth-public-routes
          uri: lb://shopre-user-authentication-service
          predicates:
            - Path=/api/v1/auth/**

        - id: shopre-user-public-routes
          uri: lb://shopre-user-authentication-service
          predicates:
            - Path=/api/v1/users/**

        - id: shopre-product-service-public-routes
          uri: lb://shopre-product-service
          predicates:
            - Path=/api/v1/products/**

        - id: shopre-product-service-public-admin-routes
          uri: lb://shopre-product-service
          predicates:
            - Path=/api/v1/admin/products/**

        - id: shopre-cart-management
          uri: lb://shopre-order-and-cart-management-service
          predicates:
            - Path=/api/v1/cart/**