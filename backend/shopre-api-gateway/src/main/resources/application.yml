server:
  port: 8081

spring:
  application:
    name: shopre-api-gateway
  profiles:
    active: local
  cloud:
    gateway:
      enabled: true
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          "[/**]":
            allowedOrigins:
              - http://localhost:5173
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - "*"
            allowCredentials: true
        discovery:
          locator:
            enabled: true
        default-filters:
          # Remove downstream CORS headers so only gateway-managed CORS is returned
          - RemoveResponseHeader=Access-Control-Allow-Origin
          - RemoveResponseHeader=Access-Control-Allow-Credentials
          # Dedupe just in case anything else adds CORS headers
          - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin, RETAIN_FIRST
      routes:
        - id: shopre-user-authentication-service-public-routes
          uri: lb://shopre-user-authentication-service
          predicates:
            - Path=/api/v1/auth/**

        - id: shopre-user-authentication-service-private-routes
          uri: lb://shopre-user-authentication-service
          predicates:
            - Path=/api/v1/users/**

        - id: shopre-product-service-public-routes
          uri: lb://shopre-product-service
          predicates:
            - Path=/api/v1/products/**

        - id: shopre-product-service-private-admin-routes
          uri: lb://shopre-product-service
          predicates:
            - Path=/api/v1/admin/products/**
          filters:
            - RequireAdminRoleFilter

        - id: shopre-cart-management-service-routes
          uri: lb://shopre-order-and-cart-management-service
          predicates:
            - Path=/api/v1/cart/**