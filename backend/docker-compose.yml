version: "3.8"

services:
  shopre-product-service:
    image: kunal2142/shopre-product-service
    container_name: shopre-product-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://shopre-product-db:5432/shopre-product-db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - shopre-product-db
    networks:
      - shopre-network

  shopre-product-db:
    image: postgres:16-alpine
    container_name: shopre-product-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shopre-product-db
    ports:
      - "5440:5432"
    volumes:
      - shopre-product-db-data:/var/lib/postgresql/data
    networks:
      - shopre-network


  shopre-user-authentication-service:
    image: kunal2142/shopre-user-authentication-service
    container_name: shopre-user-authentication-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://shopre-users-db:5432/shopre-users-db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - shopre-users-db
    networks:
      - shopre-network

  shopre-users-db:
    image: postgres:16-alpine
    container_name: shopre-users-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shopre-users-db
    ports:
      - "5441:5432"
    volumes:
      - shopre-users-db-data:/var/lib/postgresql/data
    networks:
      - shopre-network



volumes:
  shopre-product-db-data:
  shopre-users-db-data:

networks:
  shopre-network:
    driver: bridge